<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>슬롯머신 & 러시안 게임 통합 (쿠키 저장 포함)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron&display=swap');

  body {
    background: #121212;
    color: #0ff;
    font-family: 'Orbitron', monospace, Arial, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    height: 100vh;
    user-select:none;
  }
  #sidebar {
    width: 160px;
    background: #0a0a0a;
    box-shadow: inset -2px 0 5px #0ff;
    display: flex;
    flex-direction: column;
    padding: 1rem;
    gap: 1rem;
  }
  button.menuBtn {
    background: #0ff;
    border: none;
    border-radius: 12px;
    padding: 12px;
    font-size: 1rem;
    font-weight: 700;
    color: #111;
    cursor: pointer;
    box-shadow: 0 0 15px #0ff;
    transition: background 0.3s ease;
  }
  button.menuBtn:hover {
    background: #33ffff;
  }
  button#resetBtn {
    margin-top: auto;
    background: #f33;
    box-shadow: 0 0 15px #f33;
  }
  button#resetBtn:hover {
    background: #ff6666;
  }

  #main {
    flex: 1;
    padding: 2rem;
    overflow-y: auto;
  }

  /* 슬롯머신 스타일 */
  #slot-machine {
    max-width: 400px;
    margin: auto;
    background: #111;
    border-radius: 15px;
    padding: 2rem 2rem 3rem;
    box-shadow: 0 0 25px #0ff;
    position: relative;
  }
  #slots {
    display: flex;
    justify-content: center;
    margin-bottom: 1.5rem;
  }
  .slot {
    font-size: 5rem;
    width: 90px;
    height: 90px;
    margin: 0 12px;
    background: linear-gradient(145deg, #000, #222);
    border-radius: 20px;
    line-height: 90px;
    box-shadow:
      inset 0 0 12px #0ff,
      0 0 8px #0ff;
    user-select:none;
  }
  #spinBtn {
    background: #0ff;
    border: none;
    border-radius: 15px;
    padding: 15px 40px;
    font-size: 1.6rem;
    font-weight: 700;
    color: #111;
    cursor: pointer;
    transition: background 0.3s ease;
    box-shadow: 0 0 12px #0ff;
    user-select:none;
  }
  #spinBtn:hover:enabled {
    background: #33ffff;
  }
  #spinBtn:disabled {
    background: #055;
    cursor: default;
  }
  #money {
    font-size: 1.3rem;
    margin-bottom: 1.5rem;
    letter-spacing: 2px;
  }
  /* 파티클 스타일 */
  .particle {
    position: fixed;
    pointer-events: none;
    user-select:none;
    will-change: transform, opacity;
    mix-blend-mode: screen;
  }

  /* 러시안 룰렛 스타일 */
  #russian-game {
    max-width: 400px;
    margin: auto;
    background: #111;
    border-radius: 15px;
    padding: 2rem 2rem 3rem;
    box-shadow: 0 0 25px #f00;
    color: #f00;
    font-weight: 700;
    user-select:none;
  }
  #bullet-chambers {
    display: flex;
    justify-content: center;
    margin: 1.5rem 0;
  }
  .chamber {
    width: 40px;
    height: 40px;
    margin: 0 6px;
    background: #222;
    border-radius: 50%;
    box-shadow: inset 0 0 10px #f00;
    line-height: 40px;
    font-size: 1.3rem;
    cursor: default;
    user-select:none;
  }
  #shootBtn {
    background: #f00;
    border: none;
    border-radius: 15px;
    padding: 12px 36px;
    font-size: 1.4rem;
    font-weight: 700;
    color: #111;
    cursor: pointer;
    transition: background 0.3s ease;
    box-shadow: 0 0 15px #f00;
    user-select:none;
  }
  #shootBtn:hover:enabled {
    background: #ff5555;
  }
  #shootBtn:disabled {
    background: #660000;
    cursor: default;
  }
  #russianResult {
    font-size: 1.4rem;
    min-height: 2.2rem;
  }

</style>
</head>
<body>
  <nav id="sidebar" aria-label="게임 선택 메뉴">
    <button class="menuBtn" id="btnSlot">슬롯머신</button>
    <button class="menuBtn" id="btnRussian">러시안게임</button>
    <button class="menuBtn" id="resetBtn" disabled>재설정</button>
  </nav>
  <main id="main" tabindex="0">
    <!-- 슬롯머신 영역 -->
    <section id="slot-machine" role="region" aria-label="슬롯머신 게임">
      <h1>💰 자본금 슬롯머신 💰</h1>
      <div id="money">💵 자본금: <span id="moneyAmount">1000</span>원</div>
      <div id="slots" aria-live="polite" aria-atomic="true">
        <div class="slot" id="slot1" aria-label="슬롯 1">❓</div>
        <div class="slot" id="slot2" aria-label="슬롯 2">❓</div>
        <div class="slot" id="slot3" aria-label="슬롯 3">❓</div>
      </div>
      <button id="spinBtn" aria-label="스핀 버튼">스핀!</button>
    </section>

    <!-- 러시안 게임 영역 (초기에는 숨김) -->
    <section id="russian-game" role="region" aria-label="러시안 룰렛 게임" hidden>
      <h1>🔫 러시안 룰렛 🔫</h1>
      <div id="moneyRussian" style="font-size:1.2rem; margin-bottom:1rem;">💵 자본금: <span id="moneyRussianAmount">1000</span>원</div>
      <div id="bullet-chambers" aria-label="총알 방 6개">
        <div class="chamber" aria-label="방 1">1</div>
        <div class="chamber" aria-label="방 2">2</div>
        <div class="chamber" aria-label="방 3">3</div>
        <div class="chamber" aria-label="방 4">4</div>
        <div class="chamber" aria-label="방 5">5</div>
        <div class="chamber" aria-label="방 6">6</div>
      </div>
      <button id="shootBtn" aria-label="발사 버튼">발사!</button>
      <div id="russianResult" aria-live="polite"></div>
    </section>
  </main>

<script>
(() => {
  // 쿠키 관련 함수
  function setCookie(name, value, days) {
    const expires = days ? `; expires=${new Date(Date.now() + days*864e5).toUTCString()}` : '';
    document.cookie = name + '=' + encodeURIComponent(value) + expires + '; path=/';
  }
  function getCookie(name) {
    return document.cookie.split('; ').reduce((r, v) => {
      const parts = v.split('=');
      return parts[0] === name ? decodeURIComponent(parts[1]) : r;
    }, '');
  }

  // 공통 자본금 (슬롯과 러시안게임에서 공유)
  let money = 1000;

  // ======= 슬롯머신 =========
  const spinBtn = document.getElementById('spinBtn');
  const slots = [
    document.getElementById('slot1'),
    document.getElementById('slot2'),
    document.getElementById('slot3')
  ];
  const moneyDisplay = document.getElementById('moneyAmount');
  const spinCost = 100;
  const jackpotReward = 10000;
  const twoMatchReward = 300;
  const symbols = ['🍒', '🍋', '🍉', '⭐', '🍀', '💎', '7️⃣'];

  // ======= 러시안 룰렛 =========
  const russianGameSection = document.getElementById('russian-game');
  const moneyRussianDisplay = document.getElementById('moneyRussianAmount');
  const shootBtn = document.getElementById('shootBtn');
  const chambers = [...document.querySelectorAll('#bullet-chambers .chamber')];
  const russianResult = document.getElementById('russianResult');

  let bulletPos = -1;
  let chamberIndex = 0;

  // 재설정 버튼
  const resetBtn = document.getElementById('resetBtn');

  function updateMoneyDisplays() {
    moneyDisplay.textContent = money;
    moneyRussianDisplay.textContent = money;
    // 돈 0 이하면 재설정 버튼 활성화
    resetBtn.disabled = money > 0;
    // 게임 버튼들도 돈 부족시 비활성화
    spinBtn.disabled = money < spinCost;
    shootBtn.disabled = money <= 0;
  }

  function saveMoney() {
    setCookie('game_money', money, 7);
  }
  function loadMoney() {
    const c = getCookie('game_money');
    if (c && !isNaN(c)) {
      money = Number(c);
    } else {
      money = 1000;
      saveMoney();
    }
  }

  function createParticle(x, y) {
    const particle = document.createElement('div');
    particle.classList.add('particle');
    particle.style.left = `${x}px`;
    particle.style.top = `${y}px`;
    const size = Math.random() * 10 + 5;
    particle.style.width = `${size}px`;
    particle.style.height = `${size}px`;
    particle.style.background = `hsl(${Math.random()*360}, 100%, 70%)`;
    particle.style.borderRadius = '50%';
    particle.style.opacity = 1;
    document.body.appendChild(particle);

    const angle = Math.random() * 2 * Math.PI;
    const speed = Math.random() * 6 + 4;
    let vx = Math.cos(angle) * speed;
    let vy = Math.sin(angle) * speed;
    let gravity = 0.15;
    let life = 60;

    function animate() {
      if (life <= 0) {
        particle.remove();
        return;
      }
      vx *= 0.95;
      vy += gravity;
      particle.style.transform = `translate(${vx* (60 - life)}px, ${vy*(60 - life)}px)`;
      particle.style.opacity = life / 60;
      life--;
      requestAnimationFrame(animate);
    }
    animate();
  }

  function createJackpotParticles() {
    const rect = document.getElementById('slots').getBoundingClientRect();
    for(let i = 0; i < 80; i++) {
      const x = rect.left + rect.width / 2 + (Math.random() - 0.5) * rect.width;
      const y = rect.top + rect.height / 2 + (Math.random() - 0.5) * rect.height;
      setTimeout(() => createParticle(x, y), i * 15);
    }
  }

  function getRandomSymbol() {
    return symbols[Math.floor(Math.random() * symbols.length)];
  }

  function spinSlots() {
    if (money < spinCost) {
      alert("💸 자본금 부족! 게임을 더 못해요.");
      return;
    }
    money -= spinCost;
    updateMoneyDisplays();
    saveMoney();

    spinBtn.disabled = true;

    let spins = 20;
    let interval = 70;
    let count = 0;

    let spinInterval = setInterval(() => {
      slots.forEach(slot => {
        slot.textContent = getRandomSymbol();
      });
      count++;
      if (count >= spins) {
        clearInterval(spinInterval);
        checkSlotResult();
        spinBtn.disabled = false;
      }
    }, interval);
  }

  function checkSlotResult() {
    const s1 = slots[0].textContent;
    const s2 = slots[1].textContent;
    const s3 = slots[2].textContent;

    if (s1 === s2 && s2 === s3) {
      money += jackpotReward;
      updateMoneyDisplays();
      saveMoney();
      createJackpotParticles();
    } else if (s1 === s2 || s2 === s3 || s1 === s3) {
      money += twoMatchReward;
      updateMoneyDisplays();
      saveMoney();
    }
  }

  spinBtn.onclick = spinSlots;

  function resetRussianGame() {
    bulletPos = Math.floor(Math.random() * 6);
    chamberIndex = 0;
    russianResult.textContent = '';
    chambers.forEach(c => c.style.backgroundColor = '#222');
    updateMoneyDisplays();
    shootBtn.disabled = money <= 0;
  }

  function shoot() {
    if (money <= 0) {
      alert("💸 자본금 부족! 게임을 더 못해요.");
      shootBtn.disabled = true;
      return;
    }
    // 현재 방 색 변경
    chambers.forEach(c => c.style.backgroundColor = '#222');
    chambers[chamberIndex].style.backgroundColor = '#f00';

    if (chamberIndex === bulletPos) {
      // 총알 발사 - 죽음
      money -= 400; // 페널티
      if (money < 0) money = 0;
      russianResult.textContent = '💥 사망! 페널티 -400원';
      shootBtn.disabled = true;
      updateMoneyDisplays();
      saveMoney();
      setTimeout(() => {
        resetRussianGame();
      }, 2000);
    } else {
      // 안전
      money += 100; // 보상
      russianResult.textContent = '😅 안전! +100원 획득';
      chamberIndex++;
      if (chamberIndex > 5) {
        // 모든 방 안전 통과
        russianResult.textContent = '🎉 성공적으로 모두 통과! +500원 보너스';
        money += 500;
        shootBtn.disabled = true;
        setTimeout(() => {
          resetRussianGame();
        }, 2000);
      }
      updateMoneyDisplays();
      saveMoney();
    }
  }

  shootBtn.onclick = shoot;

  // 메뉴 버튼 이벤트
  const btnSlot = document.getElementById('btnSlot');
  const btnRussian = document.getElementById('btnRussian');
  const slotSection = document.getElementById('slot-machine');

  btnSlot.onclick = () => {
    slotSection.hidden = false;
    russianGameSection.hidden = true;
    btnSlot.disabled = true;
    btnRussian.disabled = false;
  };
  btnRussian.onclick = () => {
    slotSection.hidden = true;
    russianGameSection.hidden = false;
    btnSlot.disabled = false;
    btnRussian.disabled = true;
  };

  // 재설정 버튼 클릭 시
  resetBtn.onclick = () => {
    if (confirm("자본금을 1000원으로 재설정하시겠습니까?")) {
      money = 1000;
      saveMoney();
      updateMoneyDisplays();
      resetRussianGame();
      alert("자본금이 초기화되었습니다.");
    }
  };

  // 초기화 시 돈 로드, 게임 준비
  loadMoney();
  updateMoneyDisplays();
  resetRussianGame();

  // 초기 메뉴 설정 - 슬롯 활성화
  btnSlot.disabled = true;

})();
</script>

</body>
</html>
